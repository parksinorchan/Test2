<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商户服务平台</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .grid-sum { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; }
        button { background: #007bff; color: white; border: none; font-weight: bold; }
        .nav-btn { background: #6c757d; margin-top: 20px; }
    </style>
</head>
<body>

<div id="loginPage" class="page active">
    <div class="card">
        <h2>商户登录</h2>
        <input type="text" id="user" placeholder="商户账号">
        <input type="password" placeholder="密码">
        <button onclick="login()">登录</button>
    </div>
</div>

<div id="mainPage" class="page">
    <div class="card">
        <h3>今日交易概览</h3>
        <div class="grid-sum">
            <div class="stat-item"><small>总交易额</small><br><strong>¥12,450.00</strong></div>
            <div class="stat-item"><small>交易笔数</small><br><strong>128</strong></div>
        </div>
    </div>
    <div class="card">
        <h4>近期流水</h4>
        <p style="font-size: 14px; color: #666;">2026-04-19 10:20 | +¥200.00 | 成功</p>
        <p style="font-size: 14px; color: #666;">2026-04-19 09:15 | +¥50.00 | 成功</p>
    </div>
    <button class="nav-btn" onclick="showPage('loginPage')">退出登录</button>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }
    function login() {
        const username = document.getElementById('user').value;
        showPage('mainPage');
    }
</script>
</body>
</html>
