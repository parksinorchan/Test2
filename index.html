<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商户入驻调测版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden { display: none; }
        .active-tab { color: #2563eb; border-bottom: 2px solid #2563eb; }
        /* 调试面板样式 */
        #debug-panel { transition: transform 0.3s ease-in-out; }
        .panel-hidden { transform: translateX(100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="app-container">
        </div>

    <div id="debug-trigger" onclick="toggleDebug()" class="fixed right-0 top-1/2 -translate-y-1/2 bg-red-500 text-white p-2 rounded-l-lg shadow-lg z-[100] cursor-pointer text-xs">
        <i class="fas fa-bug"></i> 调测
    </div>

    <div id="debug-panel" class="fixed right-0 top-0 w-64 h-full bg-white shadow-2xl z-[101] p-4 panel-hidden overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold">Mock 参数调测</h3>
            <button onclick="toggleDebug()" class="text-gray-400">&times;</button>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-gray-500 mb-1">接口返回状态 (code)</label>
                <input type="number" id="mock-code" class="w-full border p-1 text-sm rounded" value="200">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">自定义提示消息 (msg)</label>
                <input type="text" id="mock-msg" class="w-full border p-1 text-sm rounded" value="提交成功">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">模拟网络延迟 (ms)</label>
                <input type="number" id="mock-delay" class="w-full border p-1 text-sm rounded" value="500">
            </div>
            <button onclick="saveMockConfig()" class="w-full bg-blue-600 text-white py-2 rounded text-sm">更新 Mock 配置</button>
        </div>
        
        <div class="mt-8 text-[10px] text-gray-400">
            * 修改后点击提交按钮，前端将拦截请求并返回上方配置的内容。
        </div>
    </div>

    <div id="page-register" class="p-6">
        <h1 class="text-xl font-bold mb-6">注册商户</h1>
        <button id="submit-reg" class="w-full bg-blue-600 text-white py-3 rounded-xl">注册并进件</button>
    </div>

    <script>
        /**
         * 1. 后端 Mock 服务模拟器
         */
        const MockService = {
            // 默认配置
            config: {
                code: 200,
                msg: "操作成功",
                data: { merchantId: "M88899" },
                delay: 500
            },

            // 模拟异步 API 请求
            async post(url, payload) {
                console.log(`%c[Mock 请求] URL: ${url}`, "color: #2563eb; font-weight: bold", payload);
                
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        if (this.config.code === 200) {
                            resolve(this.config);
                        } else {
                            reject(this.config);
                        }
                    }, this.config.delay);
                });
            }
        };

        /**
         * 2. 调测面板逻辑
         */
        function toggleDebug() {
            document.getElementById('debug-panel').classList.toggle('panel-hidden');
        }

        function saveMockConfig() {
            MockService.config.code = parseInt(document.getElementById('mock-code').value);
            MockService.config.msg = document.getElementById('mock-msg').value;
            MockService.config.delay = parseInt(document.getElementById('mock-delay').value);
            alert('Mock 配置已更新，下次请求生效');
        }

        /**
         * 3. 业务逻辑与 API 调测对接
         */
        document.getElementById('submit-reg').onclick = async function() {
            const btn = this;
            btn.disabled = true;
            btn.innerText = "提交中...";

            try {
                // 使用 MockService 替代真实的 fetch/axios
                const response = await MockService.post('/api/register', { phone: '138...' });
                
                alert(`接口返回结果：\n状态码：${response.code}\n消息：${response.msg}`);
                
                if(response.code === 200) {
                    // 跳转逻辑...
                }
            } catch (err) {
                alert(`请求失败 (Error ${err.code}): ${err.msg}`);
            } finally {
                btn.disabled = false;
                btn.innerText = "注册并进件";
            }
        };
    </script>
</body>
</html>
